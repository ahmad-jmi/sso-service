spring:
  application:
    name: sso-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ssoservice
    username: dev
    password: dev

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns schema changes, not Hibernate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

app:
  jwt:
    # Local-dev only placeholder - replace with a securely generated secret
    # (32+ bytes) injected via environment variable in staging/prod, never committed.
    secret: ${JWT_SECRET:this-is-a-local-dev-only-secret-change-me-1234567890}
    access-token-ttl-seconds: 900

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
